baseURL = "https://thankfulfor.github.io/portfolio/"
locale = "ru-ru"
defaultContentLanguage = "ru"
title = "Portfolio — Technical Writing"
theme = "PaperMod"

[pagination]
pagerSize = 10

[params]
defaultTheme = "dark"
disableThemeToggle = true
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowBreadCrumbs = true
ShowToc = true
TocOpen = true

[menu]
  [[menu.main]]
  identifier = "home"
  name = "Главная"
  url = "/"
  weight = 10

  [[menu.main]]
  identifier = "tech-writing"
  name = "Tech Writing"
  url = "/tech/"
  weight = 20

  [[menu.main]]
  identifier = "ux-writing"
  name = "UX Writing"
  url = "/ux/"
  weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
